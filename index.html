<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Chamados GLPI - Copiar Textos</title>
<style>
body {
font-family: Arial, sans-serif;
background: #f4f4f4;
padding: 20px;
max-width: 800px;
margin: 0 auto;
}
h1 {
text-align: center;
color: #333;
}
h2 {
margin-top: 40px;
color: #444;
border-bottom: 2px solid #ccc;
padding-bottom: 5px;
}
.chamado {
background: #fff;
border: 1px solid #ddd;
border-radius: 8px;
padding: 15px;
margin-bottom: 15px;
}
.chamado p {
margin: 0 0 10px 0;
font-size: 14px;
color: #555;
}
.btn-group {
display: flex;
gap: 10px;
}
button {
flex: 1;
padding: 10px;
border: none;
border-radius: 5px;
cursor: pointer;
font-size: 14px;
color: #fff;
transition: background 0.2s;
}
.btn-desc {
background: #007bff;
}
.btn-desc:hover {
background: #0056b3;
}
.btn-sol {
background: #28a745;
}
.btn-sol:hover {
background: #1e7e34;
}
button.copiado {
background: #ffc107 !important;
color: #000;
}
</style>
</head>
<body>
<h1>Chamados GLPI</h1>
<h2>Ligar Equipamentos</h2>
<div class="chamado">
<div class="btn-group">
<button class="btn-desc" data-copy="tablet, computadores e tvs">Copiar Descrição</button>
<button class="btn-sol" data-copy="Equipamentos da recepção foram todos ligados">Copiar Solução</button>
</div>
</div>
<div class="chamado">
<div class="btn-group">
<button class="btn-desc" data-copy="disjuntores, iluminação cênica, ar condicionados projetor, tv's, sistema de som">Copiar Descrição</button>
<button class="btn-sol" data-copy="Exposição do Futuro das Profissões ligada e verificada">Copiar Solução</button>
</div>
</div>
<div class="chamado">
<div class="btn-group">
<button class="btn-desc" data-copy="disjuntores, iluminação cênica, ar condicionados projetor, tv's, sistema de som">Copiar Descrição</button>
<button class="btn-sol" data-copy="Exposição do café ligada e verificada">Copiar Solução</button>
</div>
</div>
<div class="chamado">
<div class="btn-group">
<button class="btn-desc" data-copy="ar condicionados, iluminação ambiente, projetor, notebook">Copiar Descrição</button>
<button class="btn-sol" data-copy="Todos os equipamentos do salão do algodão foram ligados com sucesso.">Copiar Solução</button>
</div>
</div>
<h2>Desligar Equipamentos</h2>
<div class="chamado">
<div class="btn-group">
<button class="btn-desc" data-copy="tablet, computadores e tvs">Copiar Descrição</button>
<button class="btn-sol" data-copy="Equipamentos da recepção foram todos desligados">Copiar Solução</button>
</div>
</div>
<div class="chamado">
<div class="btn-group">
<button class="btn-desc" data-copy="disjuntores, iluminação cênica, ar condicionados projetor, tv's, sistema de som">Copiar Descrição</button>
<button class="btn-sol" data-copy="Exposição do Futuro das Profissões desligada e verificada">Copiar Solução</button>
</div>
</div>
<div class="chamado">
<div class="btn-group">
<button class="btn-desc" data-copy="disjuntores, iluminação cênica, ar condicionados projetor, tv's, sistema de som">Copiar Descrição</button>
<button class="btn-sol" data-copy="Exposição do café desligada e verificada">Copiar Solução</button>
</div>
</div>
<div class="chamado">
<div class="btn-group">
<button class="btn-desc" data-copy="ar condicionados, iluminação ambiente, projetor, notebook">Copiar Descrição</button>
<button class="btn-sol" data-copy="Todos os equipamentos do salão do algodão foram desligados com sucesso.">Copiar Solução</button>
</div>
</div>
<script>
document.querySelectorAll('button[data-copy]').forEach(botao => {
botao.addEventListener('click', () => {
navigator.clipboard.writeText(botao.dataset.copy).then(() => {
const textoOriginal = botao.textContent;
botao.textContent = 'Copiado!';
botao.classList.add('copiado');
setTimeout(() => {
botao.textContent = textoOriginal;
botao.classList.remove('copiado');
}, 1200);
}).catch(err => {
alert('Erro ao copiar: ' + err);
});
});
});
</script>
</body>
</html>
